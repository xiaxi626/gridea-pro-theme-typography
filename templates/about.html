<!DOCTYPE html>
<html lang="zh-CN">
<head>
    {% include "partials/head.html" %}
    <title>About · {{ config.siteName }}</title>
    <meta name="description" content="About - {{ config.siteName }}">
</head>
<body>
    <div id="stage" class="container">
        <div class="row">
            {% include "partials/sidebar.html" %}
            <div id="main-container" class="col-sm-9 col-xs-12 main-container invisible">
                <div class="autopagerize_page_element">
                    <div class="content">
                        <div class="post-page">
                            <article class="post">
                                <div class="post-header">
                                    <header>
                                        <h1 class="post-title">About</h1>
                                    </header>
                                </div>
                                <div class="content e-content">
                                    {% if post and post.content %}
                                    {{ post.content|safe }}
                                    {% else %}
                                    <p>Welcome to my blog!</p>
                                    <p>This site is powered by Gridea Pro.</p>
                                    {% endif %}
                                </div>
                            </article>
                        </div>
                    </div>
                </div>
                
                <div class="visible-xs site-bottom-footer">
                    {% include "partials/footer.html" %}
                </div>
            </div>
        </div>
    </div>

    <script src="/scripts/jquery-3.1.0.min.js" defer></script>
    <script src="/scripts/bootstrap.min.js" defer></script>
    <script src="/scripts/typography.js" defer></script>
</body>
</html>
